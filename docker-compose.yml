# Memory Forensics Platform — full stack
#
# Services:
#   redis    : broker + result backend for Celery
#   backend  : Django REST API + admin (gunicorn)
#   worker   : Celery worker running Volatility 3 + report jobs
#   beat     : Celery beat scheduler (optional periodic tasks)
#   frontend : React SPA served by Nginx
#   nginx    : Edge reverse proxy in front of everything
#
# Persistence:
#   db_data        — SQLite DB (or use external Postgres via DATABASE_URL)
#   evidence_data  — Uploaded memory dumps / artifacts
#   reports_data   — Generated PDF/HTML reports

name: mfp

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [mfp_net]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mfp/backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      MFP_ROLE: web
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - db_data:/app/data
      - evidence_data:/app/media/evidence
      - reports_data:/app/media/reports
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/schema/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks: [mfp_net]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mfp/backend:latest
    pull_policy: never
    command: ["worker"]
    restart: unless-stopped
    env_file: .env
    environment:
      MFP_ROLE: worker
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - db_data:/app/data
      - evidence_data:/app/media/evidence
      - reports_data:/app/media/reports
      - vol_symbols:/home/mfp/.cache/volatility3
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks: [mfp_net]

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mfp/backend:latest
    pull_policy: never
    command: ["beat"]
    restart: unless-stopped
    env_file: .env
    environment:
      MFP_ROLE: beat
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - db_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks: [mfp_net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: mfp/frontend:latest
    restart: unless-stopped
    networks: [mfp_net]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${MFP_HTTP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks: [mfp_net]

networks:
  mfp_net:
    driver: bridge

volumes:
  db_data:
  evidence_data:
  reports_data:
  vol_symbols:

# Frontend SPA — served from Nginx, this conf is only used if the
# frontend container is run standalone. In docker-compose, the edge
# `nginx` reverse proxy fronts everything (see docker/nginx/default.conf).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}

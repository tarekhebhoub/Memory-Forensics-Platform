# ───────────── Memory Forensics Platform — Edge reverse proxy ─────────────
# Routes:
#   /api/      → backend (Django / DRF)
#   /admin/    → backend (Django admin)
#   /static/   → backend (whitenoise)
#   /media/    → backend (uploaded artifacts, internal access only)
#   /          → frontend (React SPA)
#
# Tuning is geared toward forensics workloads: memory dump uploads can
# be tens of gigabytes and analysis APIs may stream long responses.

upstream mfp_backend  { server backend:8000;  }
upstream mfp_frontend { server frontend:80;   }

server {
    listen 80 default_server;
    server_name _;

    # Re-resolve upstream hostnames every 30s so container-IP changes after a
    # rebuild don't leave nginx pointing at a dead address (avoids 502 storms).
    # Using variables in proxy_pass forces nginx to use the resolver instead of
    # caching the IP at startup.
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;
    set $mfp_backend  "http://backend:8000";
    set $mfp_frontend "http://frontend:80";

    # Allow very large memory image uploads.
    client_max_body_size       16G;
    client_body_buffer_size    1m;
    client_body_timeout        1800s;
    proxy_connect_timeout      60s;
    proxy_send_timeout         1800s;
    proxy_read_timeout         1800s;
    send_timeout               1800s;

    # Hide stack traces from the world.
    server_tokens off;

    # Security headers (relaxed for self-hosted SOC use).
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection         "1; mode=block" always;

    # ─── Backend: API + admin + static + media ────────────────────────
    location /api/ {
        proxy_pass         $mfp_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_request_buffering off;       # stream uploads
    }

    location /admin/ {
        proxy_pass         $mfp_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass         $mfp_backend;
        proxy_set_header   Host              $host;
        proxy_cache_valid  200 1h;
    }

    # /media/ contains evidence artifacts — never expose publicly in production.
    location /media/ {
        internal;
        proxy_pass         $mfp_backend;
    }

    # ─── Frontend SPA ────────────────────────────────────────────────
    location / {
        proxy_pass         $mfp_frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
